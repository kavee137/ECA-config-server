spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: ${CONFIG_REPO_PATH:file:./config-repo,file:../config-repo,file:../../config-repo}

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: health,info
